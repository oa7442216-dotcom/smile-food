<!DOCTYPE html>

<head>

<title>منتجات سمايل فود</title>

<link rel="stylesheet" href="style.css">

<style>

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:30px;
}

.card{
background:#fff;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,.15);
padding:20px;
text-align:center;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
border-radius:10px;
}

.card h3{
margin:15px 0;
}

.price{
color:#c40000;
font-size:24px;
font-weight:bold;
}

.buy{
display:block;
margin-top:15px;
background:#25D366;
color:white;
padding:12px;
border-radius:8px;
text-decoration:none;
font-size:18px;
}

</style>

</head>

<body>

<header>

<div class="logo">🫒 سمايل فود</div>

<nav>
