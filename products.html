<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منتجات سمايل فود</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f5f5;
margin:0;
direction:rtl;
}

header{
background:#28a745;
padding:15px;
text-align:center;
color:#fff;
}

nav a{
color:white;
text-decoration:none;
margin:10px;
font-weight:bold;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
text-align:center;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
border-radius:8px;
}

.price{
font-size:22px;
color:#c40000;
font-weight:bold;
}

.buy{
display:inline-block;
margin-top:15px;
padding:10px 20px;
background:#25D366;
color:white;
text-decoration:none;
border-radius:6px;
}
</style>

</head>
<body>

<header>
<h1>منتجات سمايل فود</h1>

<nav>
<a href="index.html">الرئيسية</a>
<a href="admin.html">لوحة التحكم</a>
</nav>

</header>

<div class="products" id="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1615485290382-441e4d049cb5?w=600">
<h3>زيتون أخضر</h3>
<p class="price">80 جنيه</p>
<a class="buy" href="https://wa.me/201017900660">اطلب الآن</a>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1615485290524-7cf35d8aacbb?w=600">
<h3>زيتون أسود</h3>
<p class="price">90 جنيه</p>
<a class="buy" href="https://wa.me/201017900660">اطلب الآن</a>
</div>

</div>

<script>
let products=JSON.parse(localStorage.getItem("products"))||[];

let container=document.getElementById("products");

products.forEach(p=>{

container.innerHTML+=`
<div class="card">
<img src="https://via.placeholder.com/300x180?text=Smile+Food">
<h3>${p.name}</h3>
<p class="price">${p.price} جنيه</p>
<a class="buy" href="https://wa.me/201017900660?text=أريد طلب ${p.name}">
اطلب الآن
</a>
</div>
`;

});
</script>

</body>
</html>
