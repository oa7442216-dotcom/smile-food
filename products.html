<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منتجات سمايل فود</title>

<link rel="stylesheet" href="style.css">

<style>
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:30px;
}

.card{
background:#fff;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,.15);
padding:20px;
text-align:center;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
border-radius:10px;
}

.card h3{
margin:15px 0;
}

.price{
color:#c40000;
font-size:24px;
font-weight:bold;
}

.buy{
display:block;
margin-top:15px;
background:#25D366;
color:white;
padding:12px;
border-radius:8px;
text-decoration:none;
font-size:18px;
}
</style>

</head>

<body>

<header>
<div class="logo">🫒 سمايل فود</div>

<nav>
<a href="index.html">الرئيسية</a>
<a href="products.html">المنتجات</a>
<a href="admin.html">لوحة التحكم</a>
</nav>

</header>

<section class="products" id="products">
</section>

<script>
let products = JSON.parse(localStorage.getItem("products")) || [];

let container = document.getElementById("products");

if(products.length === 0){
container.innerHTML = "<h2 style='text-align:center;width:100%;'>لا توجد منتجات حالياً</h2>";
}else{

products.forEach(product=>{

container.innerHTML += `
<div class="card">
<img src="${product.image || 'https://via.placeholder.com/300x200?text=Smile+Food'}">
<h3>${product.name}</h3>
<p class="price">${product.price} جنيه</p>
<a class="buy" href="https://wa.me/201017900660?text=أريد طلب ${product.name}">
اطلب عبر واتساب
</a>
</div>
`;

});

}
</script>

</body>
</html>
