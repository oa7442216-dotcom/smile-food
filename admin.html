<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة تحكم - طعام الابتسامة</title>

<style>
body{
font-family:Arial,sans-serif;
margin:0;
background:#f5f5f5;
direction:rtl;
}

header{
background:#28a745;
color:#fff;
padding:20px;
text-align:center;
}

.container{
width:90%;
margin:20px auto;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
text-align:center;
}

.card h2{
margin-bottom:10px;
color:#28a745;
}

.card p{
font-size:30px;
font-weight:bold;
}

button{
background:#28a745;
color:white;
border:none;
padding:10px 20px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#218838;
}

table{
width:100%;
margin-top:30px;
border-collapse:collapse;
background:#fff;
}

table th,
table td{
border:1px solid #ddd;
padding:12px;
text-align:center;
}

table th{
background:#28a745;
color:white;
}
</style>

</head>
<body>

<header>
<h1>لوحة تحكم طعام الابتسامة</h1>
</header>

<div class="container">

<div class="cards">

<div class="card">
<h2>المنتجات</h2>
<p>12</p>
<button>إدارة المنتجات</button>
</div>

<div class="card">
<h2>الطلبات</h2>
<p>5</p>
<button>عرض الطلبات</button>
</div>

<div class="card">
<h2>العملاء</h2>
<p>18</p>
<button>إدارة العملاء</button>
</div>

<div class="card">
<h2>المبيعات</h2>
<p>2500 ج.م</p>
<button>التقارير</button>
</div>

</div>

<table>
<tr>
<th>رقم الطلب</th>
<th>العميل</th>
<th>الحالة</th>
<th>الإجمالي</th>
</tr>

<tr>
<td>#1001</td>
<td>أحمد</td>
<td>تم التوصيل</td>
<td>350 ج.م</td>
</tr>

<tr>
<td>#1002</td>
<td>محمد</td>
<td>قيد التنفيذ</td>
<td>500 ج.م</td>
</tr>

<tr>
<td>#1003</td>
<td>علي</td>
<td>جديد</td>
<td>220 ج.م</td>
</tr>

</table>

</div>

</body>
</html>
