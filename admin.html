<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم | طعام الابتسامة</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Tahoma,sans-serif;
}
body{
    background:#f5f5f5;
}
header{
    background:#28a745;
    color:#fff;
    padding:20px;
    text-align:center;
}
.container{
    width:90%;
    margin:30px auto;
}
.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}
.card{
    background:#fff;
    border-radius:10px;
    padding:20px;
    text-align:center;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}
.card h2{
    color:#28a745;
    margin-bottom:10px;
}
.card p{
    font-size:28px;
    margin-bottom:15px;
}
button{
    background:#28a745;
    color:#fff;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    cursor:pointer;
}
button:hover{
    background:#218838;
}
table{
    width:100%;
    background:#fff;
    margin-top:30px;
    border-collapse:collapse;
}
th,td{
    border:1px solid #ddd;
    padding:12px;
    text-align:center;
}
th{
    background:#28a745;
    color:white;
}
</style>

</head>
<body>

<header>
<h1>لوحة تحكم طعام الابتسامة</h1>
</header>

<div class="container">

<div class="cards">

<div class="card">
<h2>عدد المنتجات</h2>
<p id="products">12</p>
<button>إدارة المنتجات</button>
</div>

<div class="card">
<h2>عدد الطلبات</h2>
<p id="orders">5</p>
<button>عرض الطلبات</button>
</div>

<div class="card">
<h2>عدد العملاء</h2>
<p id="users">18</p>
<button>إدارة العملاء</button>
</div>

<div class="card">
<h2>إجمالي المبيعات</h2>
<p id="sales">2500 ج.م</p>
<button>التقارير</button>
</div>

</div>

<table>
<thead>
<tr>
<th>رقم الطلب</th>
<th>اسم العميل</th>
<th>الحالة</th>
<th>الإجمالي</th>
</tr>
</thead>

<tbody>
<tr>
<td>#1001</td>
<td>أحمد</td>
<td>قيد التنفيذ</td>
<td>350 ج.م</td>
</tr>

<tr>
<td>#1002</td>
<td>محمد</td>
<td>تم التوصيل</td>
<td>500 ج.م</td>
</tr>

<tr>
<td>#1003</td>
<td>علي</td>
<td>جديد</td>
<td>220 ج.م</td>
</tr>

</tbody>

</table>

</div>

</body>
</html>
