<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
margin:0;
padding:20px;
direction:rtl;
}
.container{
max-width:700px;
margin:auto;
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px #ccc;
}
input{
width:100%;
padding:10px;
margin:10px 0;
}
button{
padding:10px 20px;
background:green;
color:#fff;
border:none;
cursor:pointer;
}
table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}
th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}
</style>

</head>
<body>

<div class="container">

<h2>إضافة منتج</h2>

<input type="text" id="name" placeholder="اسم المنتج">

<input type="number" id="price" placeholder="السعر">

<button onclick="newProduct()">إضافة</button>

<table>

<thead>

<tr>
<th>المنتج</th>
<th>السعر</th>
<th>حذف</th>
</tr>

</thead>

<tbody id="list"></tbody>

</table>

</div>

<script src="script.js"></script>

<script>

function showProducts(){

let products=JSON.parse(localStorage.getItem("products"))||[];

let list=document.getElementById("list");

list.innerHTML="";

products.forEach((p,index)=>{

list.innerHTML+=`
<tr>
<td>${p.name}</td>
<td>${p.price} ج</td>
<td><button onclick="removeProduct(${index})">حذف</button></td>
</tr>
`;

});

}

function newProduct(){

let name=document.getElementById("name").value;

let price=document.getElementById("price").value;

if(name==""||price=="") return alert("أدخل البيانات");

let products=JSON.parse(localStorage.getItem("products"))||[];

products.push({name,price});

localStorage.setItem("products",JSON.stringify(products));

document.getElementById("name").value="";
document.getElementById("price").value="";

showProducts();

}

function removeProduct(index){

let products=JSON.parse(localStorage.getItem("products"))||[];

products.splice(index,1);

localStorage.setItem("products",JSON.stringify(products));

showProducts();

}

showProducts();

</script>

</body>
</html>
